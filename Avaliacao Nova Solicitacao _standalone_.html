  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

on:relative;z-index:1;}\n\n  /* Cover */\n  .cover{border-bottom:2px solid var(--ink);padding-bottom:40px;margin-bottom:56px;}\n  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin-bottom:16px;}\n  h1.cover-title{font-family:Fraunces,serif;font-weight:900;font-size:84px;line-height:.95;letter-spacing:-0.035em;margin:0 0 18px;}\n  h1.cover-title em{font-weight:400;font-style:italic;}\n  .cover-sub{font-family:Fraunces,serif;font-size:22px;line-height:1.45;color:var(--ink-soft);max-width:760px;margin:0;}\n  .cover-meta{display:flex;gap:40px;margin-top:28px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}\n  .cover-meta span b{color:var(--ink);}\n\n  /* Chapter head */\n  .chap-head{margin:80px 0 32px;padding-top:32px;border-top:1px solid var(--rule);}\n  .chap-head .num{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;color:var(--red);margin-bottom:6px;}\n  .chap-head h2{font-family:Fraunces,serif;font-weight:900;font-size:48px;line-height:1;letter-spacing:-0.03em;margin:0 0 10px;}\n  .chap-head h2 em{font-weight:400;font-style:italic;}\n  .chap-head p{font-family:Fraunces,serif;font-size:19px;color:var(--ink-soft);margin:0;max-width:820px;line-height:1.5;}\n\n  /* Compare layout */\n  .compare{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:28px;}\n  .compare .tear{position:relative;}\n  .tear-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--rule);}\n  .tear-head .t{font-family:Fraunces,serif;font-weight:700;font-size:22px;letter-spacing:-0.01em;}\n  .tear-head .t em{font-style:italic;font-weight:400;color:var(--muted);margin-left:6px;font-size:15px;}\n  .tear-head .pin{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:3px;background:var(--ink);color:var(--paper);}\n  .tear-head .pin.now{background:#64748b;}\n  .tear-head .pin.proposta{background:var(--green);}\n  .tear-frame{background:#fff;box-shadow:0 0 0 1px var(--rule),0 20px 40px -20px rgba(0,0,0,.18);border-radius:4px;overflow:hidden;height:640px;}\n  .tear-frame iframe{width:100%;height:100%;border:none;display:block;}\n\n  /* Critique list */\n  .critique{margin-top:48px;display:grid;grid-template-columns:1fr 1fr;gap:40px;}\n  .critique-col h3{font-family:Fraunces,serif;font-size:22px;font-weight:700;letter-spacing:-0.01em;margin:0 0 14px;display:flex;align-items:baseline;gap:10px;}\n  .critique-col h3 .badge{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;padding:3px 7px;border-radius:3px;}\n  .critique-col.left h3 .badge{background:#fee2e2;color:#991b1b;}\n  .critique-col.right h3 .badge{background:#dcfce7;color:var(--green);}\n\n  .issue{border-left:3px solid var(--rule);padding:8px 0 8px 18px;margin-bottom:18px;}\n  .issue.hot{border-color:var(--red);}\n  .issue h4{font-family:Fraunces,serif;font-size:17px;font-weight:700;margin:0 0 4px;letter-spacing:-0.005em;}\n  .issue p{font-family:Fraunces,serif;font-size:15.5px;color:var(--ink-soft);margin:0;line-height:1.5;}\n  .issue p code{font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--paper-dark);padding:1px 6px;border-radius:2px;color:var(--ink);}\n\n  /* Priority matrix */\n  .matrix{margin-top:48px;background:#fff;border:1px solid var(--rule);border-radius:4px;overflow:hidden;}\n  .matrix-head{display:grid;grid-template-columns:40px 1.8fr 1fr 1fr 1fr;gap:0;padding:14px 20px;background:var(--ink);color:var(--paper);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;}\n  .matrix-row{display:grid;grid-template-columns:40px 1.8fr 1fr 1fr 1fr;gap:0;padding:18px 20px;border-bottom:1px solid var(--rule);font-family:Fraunces,serif;font-size:15px;align-items:center;}\n  .matrix-row:last-child{border-bottom:none;}\n  .matrix-row .n{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--red);font-weight:700;}\n  .matrix-row .w b{font-weight:700;display:block;margin-bottom:2px;}\n  .matrix-row .w span{font-size:13px;color:var(--muted);}\n  .matrix-row .tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:2px;font-weight:700;}\n  .tag.hi{background:#fee2e2;color:#991b1b;}\n  .tag.md{background:#fef3c7;color:#92400e;}\n  .tag.lo{background:#dbeafe;color:#1e40af;}\n  .tag.easy{background:#dcfce7;color:var(--green);}\n  .tag.med{background:#fef3c7;color:#92400e;}\n  .tag.hard{background:#fee2e2;color:#991b1b;}\n\n  /* Pull quote */\n  .pull{margin:56px 0;padding:32px 0;border-top:2px solid var(--ink);border-bottom:2px solid var(--ink);text-align:center;}\n  .pull p{font-family:Fraunces,serif;font-style:italic;font-weight:400;font-size:32px;line-height:1.2;letter-spacing:-0.015em;margin:0;color:var(--ink);max-width:900px;margin-inline:auto;}\n  .pull p b{font-style:normal;font-weight:900;background:var(--marker);padding:0 6px;}\n\n  /* Close */\n  .verdict{margin-top:56px;background:var(--ink);color:var(--paper);padding:36px 40px;border-radius:4px;}\n  .verdict .eyebrow{color:var(--marker);margin-bottom:12px;}\n  .verdict h3{font-family:Fraunces,serif;font-size:34px;font-weight:900;letter-spacing:-0.02em;margin:0 0 14px;line-height:1.1;}\n  .verdict h3 em{font-weight:400;font-style:italic;}\n  .verdict p{font-family:Fraunces,serif;font-size:17px;line-height:1.55;color:#d6ccb8;margin:0 0 10px;}\n  .verdict p b{color:var(--paper);}\n\n  footer.foot{margin-top:56px;padding-top:24px;border-top:1px solid var(--rule);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;}\n\n  @media (max-width:960px){\n    .page{padding:32px 20px 60px;}\n    h1.cover-title{font-size:56px;}\n    .compare,.critique{grid-template-columns:1fr;}\n    .tear-frame{height:520px;}\n    .matrix-head,.matrix-row{grid-template-columns:30px 1.5fr 80px 80px 80px;font-size:13px;padding:12px;}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"page\">\n\n  <!-- COVER -->\n  <section class=\"cover\">\n    <div class=\"eyebrow\">Estudo UX · Delibera · Tela \"Nova Solicitação\"<\u002Fdiv>\n    <h1 class=\"cover-title\">Tira o aluno<br><em>do caminho.<\u002Fem><\u002Fh1>\n    <p class=\"cover-sub\">\n      Delibera não tem login — o aluno envia dados, recebe protocolo por email e consulta depois. Ótimo diferencial, mas a tela atual pede identidade só no meio do formulário e enterra o tipo da solicitação no fim. Dá pra reorganizar o fluxo, pré-preencher via localStorage, e deixar o \"sem cadastro\" claro como vantagem.\n    <\u002Fp>\n    <div class=\"cover-meta\">\n      <span><b>Escopo<\u002Fb> · nova-solicitacao.html<\u002Fspan>\n      <span><b>Data<\u002Fb> · 17 abr 2026<\u002Fspan>\n      <span><b>Veredito<\u002Fb> · Bom, mas enxugável em 40%<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- COMPARE -->\n  <section>\n    <div class=\"chap-head\">\n      <div class=\"num\">§ 01 · Comparativo<\u002Fdiv>\n      <h2>Antes e <em>depois,<\u002Fem> lado a lado.<\u002Fh2>\n      <p>Mesma tela, dois caminhos. O da esquerda é o seu atual; o da direita é a proposta — interaja com ambos.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"compare\">\n      <div class=\"tear\">\n        <div class=\"tear-head\">\n          <div class=\"t\">Atual <em>v1<\u002Fem><\u002Fdiv>\n          <span class=\"pin now\">agora<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"tear-frame\">\n          <iframe src=\"app/nova-solicitacao-v1.html\" loading=\"lazy\"><\u002Fiframe>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"tear\">\n        <div class=\"tear-head\">\n          <div class=\"t\">Proposta <em>v2<\u002Fem><\u002Fdiv>\n          <span class=\"pin proposta\">proposto<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"tear-frame\">\n          <iframe src=\"app/nova-solicitacao-v2.html\" loading=\"lazy\"><\u002Fiframe>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"critique\">\n      <div class=\"critique-col left\">\n        <h3>Na versão atual <span class=\"badge\">precisa ajuste<\u002Fspan><\u002Fh3>\n\n        <div class=\"issue hot\">\n          <h4>Tipo da solicitação está enterrado<\u002Fh4>\n          <p>O tipo é a variável mais importante: define prazo, campos obrigatórios, documentos. Hoje é um <code>&lt;select&gt;<\u002Fcode> depois de 6 campos. O aluno preenche cego e só descobre no final que precisava anexar atestado. Deveria ser o primeiro passo — e visual.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue hot\">\n          <h4>Sem pré-preenchimento na volta<\u002Fh4>\n          <p>Como não há login, um aluno que já enviou algo <em>podia<\u002Fem> ter os dados salvos no navegador (localStorage). Hoje ele redigita nome/email/curso toda vez. Zero backend, puro ganho.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue hot\">\n          <h4>Sem noção de prazo / SLA<\u002Fh4>\n          <p>Envia e não sabe quando vem resposta. Como não há notificação push, o aluno fica voltando ansioso ao protocolo. \"Até 3 dias úteis\" do lado do botão Enviar resolve.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue hot\">\n          <h4>Email é a chave do produto, mas não tem destaque<\u002Fh4>\n          <p>Todo o modelo depende de <em>\"o protocolo chega no seu email\"<\u002Fem>. Hoje o campo email é mais um no meio do form. Merece hint: \"vamos mandar o código do protocolo aqui\".<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue\">\n          <h4>Ícone em todo input duplica o label<\u002Fh4>\n          <p>Envelope ao lado de \"Email\" é redundante. Se o label é claro, o ícone é ruído.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue\">\n          <h4>Cabeçalhos coloridos segmentam demais<\u002Fh4>\n          <p>Laranja, azul, verde, roxo — quatro cores de categoria num formulário curto comunica <em>organização<\u002Fem>, mas também <em>longo<\u002Fem>.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue\">\n          <h4>Sem revisão antes do envio<\u002Fh4>\n          <p>Submit direto → protocolo. Sem backend de edição, um envio errado é irrecuperável. Tela de \"revisar e confirmar\" é mais crítica aqui do que em produto com login.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue\">\n          <h4>\"Acompanhar\" sugere dashboard logado<\u002Fh4>\n          <p>Se o modelo é <em>\"você guarda o código\"<\u002Fem>, o item do menu deveria chamar-se \"Consultar protocolo\".<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"critique-col right\">\n        <h3>Na proposta <span class=\"badge\">mudou<\u002Fspan><\u002Fh3>\n\n        <div class=\"issue\">\n          <h4>Tipos como cards no topo<\u002Fh4>\n          <p><b>Passo 1<\u002Fb>: 4 cards visuais com ícone, descrição e prazo. Clicar um card abre o formulário já configurado — sem dropdown, sem ler opção por opção.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue\">\n          <h4>localStorage com \"Não sou eu\"<\u002Fh4>\n          <p>Na 2ª visita: faixa discreta \"Bem-vindo de volta, Maria! Dados preenchidos.\" com link <em>Não sou eu · limpar<\u002Fem>. Respeita compartilhamento de dispositivo, zero backend.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue\">\n          <h4>Email com hint explícito<\u002Fh4>\n          <p>Abaixo do campo email: \"<em>Vamos enviar o código de protocolo para este email.<\u002Fem>\" Reforça que esse é o canal crítico do produto.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue\">\n          <h4>Stepper de 3 etapas<\u002Fh4>\n          <p><b>1.<\u002Fb> Tipo → <b>2.<\u002Fb> Dados e descrição → <b>3.<\u002Fb> Revisar. O aluno sempre sabe onde está.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue\">\n          <h4>Campos específicos por tipo<\u002Fh4>\n          <p>Segunda chamada pede <i>data da prova<\u002Fi>; retificação pede <i>nota atual + nota esperada<\u002Fi>; abono pede <i>data(s) da falta<\u002Fi>. Cada tipo vira um formulário sob medida.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue\">\n          <h4>Upload contextual<\u002Fh4>\n          <p>Segunda chamada → obrigatório, destacado em laranja. Abono → recomendado. Retificação → opcional. A borda do upload muda conforme a obrigação.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue\">\n          <h4>Barra fixa + SLA visível + revisão<\u002Fh4>\n          <p>Prazo sempre visível ao lado do botão. Antes do envio real, card escuro de revisão com lembrete: <em>\"guardaremos o protocolo no seu email — salve este código\"<\u002Fem>.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue\">\n          <h4>Aviso LGPD discreto no rodapé<\u002Fh4>\n          <p><em>\"seus dados são usados apenas para processar esta solicitação\"<\u002Fem>. Cumpre o compromisso sem poluir o formulário.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"pull\">\n      <p>\"Sem cadastro\" é vantagem. Mas exige que o <b>tipo lidere o fluxo<\u002Fb> e o <b>email seja tratado como chave<\u002Fb> — não campo qualquer.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PRIORITY -->\n  <section>\n    <div class=\"chap-head\">\n      <div class=\"num\">§ 02 · Prioridades<\u002Fdiv>\n      <h2>Por onde <em>começar<\u002Fem>.<\u002Fh2>\n      <p>Ordenado por impacto vs. esforço. Os três primeiros resolvem 70% do atrito e cabem numa sprint.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"matrix\">\n      <div class=\"matrix-head\">\n        <div>#<\u002Fdiv>\n        <div>Mudança<\u002Fdiv>\n        <div>Impacto<\u002Fdiv>\n        <div>Esforço<\u002Fdiv>\n        <div>Ordem<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"matrix-row\">\n        <div class=\"n\">01<\u002Fdiv>\n        <div class=\"w\"><b>Tipo como cards no topo<\u002Fb><span>Reordenar o fluxo; select → grid de 4 cards.<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag hi\">Alto<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag easy\">Fácil<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag\" style=\"background:var(--ink);color:var(--marker);\">Primeiro<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"matrix-row\">\n        <div class=\"n\">02<\u002Fdiv>\n        <div class=\"w\"><b>Mostrar SLA visível<\u002Fb><span>\"até X dias úteis\" junto do botão enviar.<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag hi\">Alto<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag easy\">Fácil<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag\" style=\"background:var(--ink);color:var(--marker);\">Primeiro<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"matrix-row\">\n        <div class=\"n\">03<\u002Fdiv>\n        <div class=\"w\"><b>Destacar email como \"canal do protocolo\"<\u002Fb><span>Hint explícito sob o campo.<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag hi\">Alto<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag easy\">Fácil<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag\" style=\"background:var(--ink);color:var(--marker);\">Primeiro<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"matrix-row\">\n        <div class=\"n\">04<\u002Fdiv>\n        <div class=\"w\"><b>localStorage com \"Não sou eu\"<\u002Fb><span>Pré-preencher identidade, sem backend.<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag hi\">Alto<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag easy\">Fácil<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag\" style=\"background:var(--ink);color:var(--marker);\">Primeiro<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"matrix-row\">\n        <div class=\"n\">05<\u002Fdiv>\n        <div class=\"w\"><b>Campos específicos por tipo<\u002Fb><span>Segunda chamada ≠ retificação ≠ abono.<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag hi\">Alto<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag med\">Médio<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag lo\">Depois<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"matrix-row\">\n        <div class=\"n\">06<\u002Fdiv>\n        <div class=\"w\"><b>Tela de revisão antes do envio<\u002Fb><span>Preview + 2º clique confirma. Sem edição pós-envio, é essencial.<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag hi\">Alto<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag easy\">Fácil<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag lo\">Depois<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"matrix-row\">\n        <div class=\"n\">07<\u002Fdiv>\n        <div class=\"w\"><b>Renomear \"Acompanhar\" → \"Consultar protocolo\"<\u002Fb><span>Palavra honesta com o modelo sem login.<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag md\">Médio<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag easy\">Fácil<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag lo\">Depois<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"matrix-row\">\n        <div class=\"n\">08<\u002Fdiv>\n        <div class=\"w\"><b>Aviso LGPD no rodapé<\u002Fb><span>Caixa discreta explicando uso dos dados.<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag md\">Médio<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag easy\">Fácil<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag lo\">Depois<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"matrix-row\">\n        <div class=\"n\">09<\u002Fdiv>\n        <div class=\"w\"><b>Remover ícones redundantes de input<\u002Fb><span>Label já faz o trabalho.<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag lo\">Baixo<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag easy\">Fácil<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag lo\">Polish<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"matrix-row\">\n        <div class=\"n\">10<\u002Fdiv>\n        <div class=\"w\"><b>Unificar cores de seção<\u002Fb><span>4 cores de categoria → 1 sistema neutro.<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag lo\">Baixo<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag easy\">Fácil<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tag lo\">Polish<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CLOSE -->\n  <section class=\"verdict\">\n    <div class=\"eyebrow\">Veredito<\u002Fdiv>\n    <h3>O formulário atual é <em>funcional<\u002Fem>.<br>Com 4 ajustes, fica <em>diferencial<\u002Fem>.<\u002Fh3>\n    <p>\n      <b>Nota atual: 7.5/10.<\u002Fb> O modelo \"sem cadastro\" é um ótimo diferencial — e você já tem coisas que muito SaaS não tem: campos condicionais por tipo, dicas contextuais. O que falta é <em>tratar o tipo como o primeiro passo<\u002Fem>, <em>reconhecer o email como chave do produto<\u002Fem>, e <em>usar localStorage pra cortar redigitação<\u002Fem> sem precisar de auth.\n    <\u002Fp>\n    <p>\n      <b>Próximo passo prático:<\u002Fb> implemente os 4 primeiros itens da matriz (cards no topo, SLA visível, hint no email, localStorage). Juntos são ~2 dias de trabalho e resolvem 70% do atrito — sem escrever backend novo.\n    <\u002Fp>\n    <p style=\"margin-top:18px;font-style:italic;color:#b8ac95;\">\n      Próximas telas que merecem estudo: página de consulta do protocolo (o outro lado dessa história), dashboard do coordenador, e o email que contém o protocolo. Me chama quando quiser.\n    <\u002Fp>\n  <\u002Fsection>\n\n  <footer class=\"foot\">\n    <span>Delibera · Avaliação UX<\u002Fspan>\n    <span>17.04.2026<\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<script>\n  // Disable iframe interactions bleeding into parent scroll\n  document.querySelectorAll('iframe').forEach(f => {\n    f.addEventListener('load', () => {\n      try { /* no-op */ } catch(e) {}\n    });\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
